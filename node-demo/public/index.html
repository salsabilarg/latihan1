<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🧮 Kalkulator Web</h1>
    <p class="subtitle">Dibuat dengan Node.js murni</p>
    <div class="calculator">
      <input type="text" id="layar" placeholder="0" readonly>
      <div class="tombol-grid">
        <button class="tombol hapus" onclick="hapusSemua()">AC</button>
        <button class="tombol hapus" onclick="hapusSatu()">⌫</button>
        <button class="tombol operator" onclick="tambahKarakter('%')">%</button>
        <button class="tombol operator" onclick="tambahKarakter('/')">÷</button>

        <button class="tombol angka" onclick="tambahKarakter('7')">7</button>
        <button class="tombol angka" onclick="tambahKarakter('8')">8</button>
        <button class="tombol angka" onclick="tambahKarakter('9')">9</button>
        <button class="tombol operator" onclick="tambahKarakter('*')">×</button>

        <button class="tombol angka" onclick="tambahKarakter('4')">4</button>
        <button class="tombol angka" onclick="tambahKarakter('5')">5</button>
        <button class="tombol angka" onclick="tambahKarakter('6')">6</button>
        <button class="tombol operator" onclick="tambahKarakter('-')">−</button>

        <button class="tombol angka" onclick="tambahKarakter('1')">1</button>
        <button class="tombol angka" onclick="tambahKarakter('2')">2</button>
        <button class="tombol angka" onclick="tambahKarakter('3')">3</button>
        <button class="tombol operator" onclick="tambahKarakter('+')">+</button>

        <button class="tombol angka nol" onclick="tambahKarakter('0')">0</button>
        <button class="tombol angka" onclick="tambahKarakter('.')">.</button>
        <button class="tombol sama-dengan" onclick="hitung()">=</button>
      </div>
      <div id="riwayat">
        <h3>Riwayat Perhitungan</h3>
        <ul id="daftar-riwayat"></ul>
      </div>
    </div>
  </div>
  <script src="kalkulator.js"></script>
</body>
</html>
